<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Call Application</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div id="app">
    <!-- Lobby Screen -->
    <div id="lobby" class="screen">
      <div class="container">
        <h1>Video Call Application</h1>
        <div class="form-section">
          <h2>Join or Create a Room</h2>
          <div class="form-group">
            <label for="username">Your Name:</label>
            <input type="text" id="username" placeholder="Enter your name" required>
          </div>
          <div class="button-group">
            <button id="createRoomBtn" class="btn btn-primary">Create Room (Instructor)</button>
          </div>
          <div class="separator">OR</div>
          <div class="form-group">
            <label for="roomId">Room ID:</label>
            <input type="text" id="roomId" placeholder="Enter room ID to join">
          </div>
          <button id="joinRoomBtn" class="btn btn-secondary">Join Room (Student)</button>
        </div>
      </div>
    </div>

    <!-- Room Screen -->
    <div id="room" class="screen hidden">
      <div class="room-header">
        <div class="room-info">
          <h2 id="roomTitle">Room</h2>
          <span id="roomIdDisplay"></span>
          <span id="participantCount" class="badge">0 participants</span>
        </div>
        <button id="leaveRoomBtn" class="btn btn-danger">Leave Room</button>
      </div>

      <div class="room-content">
        <!-- Video Grid -->
        <div class="video-container">
          <div id="videoGrid" class="video-grid">
            <!-- Local video -->
            <div class="video-wrapper" id="localVideoWrapper">
              <video id="localVideo" autoplay muted playsinline></video>
              <div class="video-label">You (Instructor)</div>
              <div class="video-controls">
                <button id="toggleVideoBtn" class="control-btn" title="Toggle Video">
                  <span id="videoIcon">📹</span>
                </button>
                <button id="toggleAudioBtn" class="control-btn" title="Toggle Audio">
                  <span id="audioIcon">🎤</span>
                </button>
              </div>
            </div>
            <!-- Remote videos will be added here dynamically -->
          </div>
        </div>

        <!-- Chat Panel -->
        <div class="chat-panel">
          <div class="chat-header">
            <h3>Chat</h3>
          </div>
          <div id="chatMessages" class="chat-messages"></div>
          <div class="chat-input">
            <input type="text" id="chatInput" placeholder="Type a message..." />
            <button id="sendMessageBtn" class="btn btn-primary">Send</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/main.js"></script>
</body>
</html>
