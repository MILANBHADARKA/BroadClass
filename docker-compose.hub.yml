services:
  # System Manager
  system-manager:
    image: milanbhadarka/broadclass-system-manager:latest
    container_name: broadclass-system-manager
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=${NODE_ENV:-production}
      - ROLE=SYSTEM_MANAGER
      - REDIS_URL=${REDIS_URL}
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET:-dev-broadcast-jwt-secret-change-in-production}
      - JWT_EXPIRES_IN=7d
      - FRONTEND_ORIGIN=${FRONTEND_ORIGIN:-http://localhost:5173}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      # S3 Recording Configuration
      - S3_BUCKET=${S3_BUCKET:-broadclass}
      - S3_REGION=${S3_REGION:-ap-south-1}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_PREFIX=${S3_PREFIX:-recordings}
    restart: unless-stopped
    stop_grace_period: 10s
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - broadclass-network

  # Origin Server
  origin-server:
    image: milanbhadarka/broadclass-origin:latest
    container_name: broadclass-origin
    ports:
      - "3001:3001"
      - "40000-40399:40000-40399/udp"
      - "45000-45999:45000-45999/udp"
    environment:
      - PORT=3001
      - NODE_ENV=${NODE_ENV:-production}
      - ROLE=ORIGIN
      - ANNOUNCED_IP=${ANNOUNCED_IP:-127.0.0.1}
      - REDIS_URL=${REDIS_URL}
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET:-dev-broadcast-jwt-secret-change-in-production}
      - JWT_EXPIRES_IN=7d
      - FRONTEND_ORIGIN=${FRONTEND_ORIGIN:-http://localhost:5173}
      - ENABLE_SIMULCAST=true
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-broadclass-internal-key-change-in-production}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - NUM_WORKERS=2
      - RTC_MIN_PORT=40000
      - RTC_MAX_PORT=40399
      # S3 Recording Configuration
      - S3_BUCKET=${S3_BUCKET:-broadclass}
      - S3_REGION=${S3_REGION:-ap-south-1}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_PREFIX=${S3_PREFIX:-recordings}
    restart: unless-stopped
    stop_grace_period: 40s
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - broadclass-network

  # Edge Server 1
  edge-server-1:
    image: milanbhadarka/broadclass-edge:latest
    container_name: broadclass-edge-1
    ports:
      - "3002:3002"
      - "50000-50399:50000-50399/udp"
    environment:
      - PORT=3002
      - EXTERNAL_PORT=3002
      - INTERNAL_HOST=edge-server-1
      - NODE_ENV=${NODE_ENV:-production}
      - ROLE=EDGE
      - SERVER_ID=EDGE-01
      - ANNOUNCED_IP=${ANNOUNCED_IP:-127.0.0.1}
      - ORIGIN_IP=origin-server
      - ORIGIN_PORT=3001
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET=${JWT_SECRET:-dev-broadcast-jwt-secret-change-in-production}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-broadclass-internal-key-change-in-production}
      - MAX_CAPACITY=200
      - HEALTH_CHECK_INTERVAL=10000
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - FRONTEND_ORIGIN=${FRONTEND_ORIGIN:-http://localhost:5173}
      - NUM_WORKERS=2
      - RTC_MIN_PORT=50000
      - RTC_MAX_PORT=50399
    depends_on:
      origin-server:
        condition: service_healthy
    restart: unless-stopped
    stop_grace_period: 10s
    networks:
      - broadclass-network

  # Edge Server 2
  edge-server-2:
    image: milanbhadarka/broadclass-edge:latest
    container_name: broadclass-edge-2
    ports:
      - "3003:3002"
      - "54000-54399:54000-54399/udp"
    environment:
      - PORT=3002
      - EXTERNAL_PORT=3003
      - INTERNAL_HOST=edge-server-2
      - NODE_ENV=${NODE_ENV:-production}
      - ROLE=EDGE
      - SERVER_ID=EDGE-02
      - ANNOUNCED_IP=${ANNOUNCED_IP:-127.0.0.1}
      - ORIGIN_IP=origin-server
      - ORIGIN_PORT=3001
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET=${JWT_SECRET:-dev-broadcast-jwt-secret-change-in-production}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-broadclass-internal-key-change-in-production}
      - MAX_CAPACITY=200
      - HEALTH_CHECK_INTERVAL=10000
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - FRONTEND_ORIGIN=${FRONTEND_ORIGIN:-http://localhost:5173}
      - NUM_WORKERS=2
      - RTC_MIN_PORT=54000
      - RTC_MAX_PORT=54399
    depends_on:
      origin-server:
        condition: service_healthy
    restart: unless-stopped
    stop_grace_period: 10s
    networks:
      - broadclass-network

  # Edge Server 3
  edge-server-3:
    image: milanbhadarka/broadclass-edge:latest
    container_name: broadclass-edge-3
    ports:
      - "3004:3002"
      - "52000-52399:52000-52399/udp"
    environment:
      - PORT=3002
      - EXTERNAL_PORT=3004
      - INTERNAL_HOST=edge-server-3
      - NODE_ENV=${NODE_ENV:-production}
      - ROLE=EDGE
      - SERVER_ID=EDGE-03
      - ANNOUNCED_IP=${ANNOUNCED_IP:-127.0.0.1}
      - ORIGIN_IP=origin-server
      - ORIGIN_PORT=3001
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET=${JWT_SECRET:-dev-broadcast-jwt-secret-change-in-production}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-broadclass-internal-key-change-in-production}
      - MAX_CAPACITY=200
      - HEALTH_CHECK_INTERVAL=10000
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - FRONTEND_ORIGIN=${FRONTEND_ORIGIN:-http://localhost:5173}
      - NUM_WORKERS=2
      - RTC_MIN_PORT=52000
      - RTC_MAX_PORT=52399
    depends_on:
      origin-server:
        condition: service_healthy
    restart: unless-stopped
    stop_grace_period: 10s
    networks:
      - broadclass-network

networks:
  broadclass-network:
    driver: bridge
