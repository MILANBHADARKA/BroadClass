name: Deploy to AWS

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write   # required for OIDC AWS auth
  contents: read

env:
  AWS_REGION: ap-south-1
  AWS_ACCOUNT_ID: "968134751945"
  ECR_BASE: 968134751945.dkr.ecr.ap-south-1.amazonaws.com
  ECR_ORIGIN_REPO: broadclass-origin
  ECR_EDGE_REPO: broadclass-edge
  ORIGIN_INSTANCE_ID: i-0b89414806094d6c8
  ORIGIN_TG_ARN: arn:aws:elasticloadbalancing:ap-south-1:968134751945:targetgroup/broadclass-origin-tg/52e54a3af1f3b358
  EDGE_ASG: broadclass-edge-asg

jobs:
  # ─── 1. Lint / audit ──────────────────────────────────────────────────────
  lint:
    name: Lint & Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Security audit (fail on critical)
        run: npm audit --audit-level=critical
        working-directory: backend

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint frontend
        run: npm run lint
        working-directory: frontend

  # ─── 2. Build & push Docker images to ECR ────────────────────────────────
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: lint
    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC — no long-lived keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/broadclass-github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag (short SHA)
        id: meta
        run: echo "tag=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Origin image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/amd64
          push: true
          cache-from: type=gha,scope=origin
          cache-to: type=gha,mode=max,scope=origin
          tags: |
            ${{ env.ECR_BASE }}/${{ env.ECR_ORIGIN_REPO }}:latest
            ${{ env.ECR_BASE }}/${{ env.ECR_ORIGIN_REPO }}:${{ steps.meta.outputs.tag }}

      - name: Build and push Edge image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile.edge
          platforms: linux/amd64
          push: true
          cache-from: type=gha,scope=edge
          cache-to: type=gha,mode=max,scope=edge
          tags: |
            ${{ env.ECR_BASE }}/${{ env.ECR_EDGE_REPO }}:latest
            ${{ env.ECR_BASE }}/${{ env.ECR_EDGE_REPO }}:${{ steps.meta.outputs.tag }}

  # ─── 3. Deploy Origin via SSM ─────────────────────────────────────────────
  deploy-origin:
    name: Deploy Origin Server
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/broadclass-github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Pull & restart origin container via SSM
        # Uses --network host (REQUIRED — mediasoup needs VPC IPs, not Docker bridge IPs)
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ env.ORIGIN_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy broadclass-origin ${{ needs.build-and-push.outputs.image-tag }}" \
            --parameters 'commands=[
              "aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 968134751945.dkr.ecr.ap-south-1.amazonaws.com",
              "docker pull 968134751945.dkr.ecr.ap-south-1.amazonaws.com/broadclass-origin:latest",
              "docker stop broadclass-origin 2>/dev/null || true",
              "docker rm broadclass-origin 2>/dev/null || true",
              "docker run -d --name broadclass-origin --network host --restart unless-stopped --env-file /opt/broadclass/.env 968134751945.dkr.ecr.ap-south-1.amazonaws.com/broadclass-origin:latest"
            ]' \
            --region "${{ env.AWS_REGION }}" \
            --query "Command.CommandId" --output text)
          echo "SSM Command ID: $COMMAND_ID"
          for i in $(seq 1 24); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ env.ORIGIN_INSTANCE_ID }}" \
              --region "${{ env.AWS_REGION }}" \
              --query "StatusDetails" --output text 2>/dev/null || echo "Pending")
            echo "[$i] Status: $STATUS"
            if [ "$STATUS" = "Success" ]; then break; fi
            if [ "$STATUS" = "Failed" ]; then
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "${{ env.ORIGIN_INSTANCE_ID }}" \
                --region "${{ env.AWS_REGION }}" \
                --query "StandardErrorContent" --output text
              exit 1
            fi
            sleep 10
          done

      - name: Wait for Origin ALB health check
        run: |
          echo "Waiting for Origin to become healthy in ALB target group..."
          for i in $(seq 1 20); do
            STATUS=$(aws elbv2 describe-target-health \
              --target-group-arn "${{ env.ORIGIN_TG_ARN }}" \
              --region "${{ env.AWS_REGION }}" \
              --query 'TargetHealthDescriptions[0].TargetHealth.State' \
              --output text)
            echo "Attempt $i: Target health = $STATUS"
            if [ "$STATUS" = "healthy" ]; then
              echo "Origin is healthy."
              exit 0
            fi
            sleep 15
          done
          echo "ERROR: Origin did not become healthy in time."
          exit 1

  # ─── 4. Refresh Edge ASG (new instances pull latest image on boot) ────────
  deploy-edge:
    name: Refresh Edge ASG
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy-origin]
    environment: production
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/broadclass-github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Start Edge ASG instance refresh
        # Replaces 50% of edge instances at a time (rolling).
        # Each new instance pulls broadclass-edge:latest from ECR on boot.
        # Min healthy percentage = 50% so students always have at least half the edges.
        run: |
          REFRESH_ID=$(aws autoscaling start-instance-refresh \
            --auto-scaling-group-name "${{ env.EDGE_ASG }}" \
            --preferences '{"MinHealthyPercentage":50,"InstanceWarmup":120,"SkipMatching":false}' \
            --region "${{ env.AWS_REGION }}" \
            --query 'InstanceRefreshId' \
            --output text)
          echo "Instance refresh started: $REFRESH_ID"
          echo "REFRESH_ID=$REFRESH_ID" >> $GITHUB_ENV

      - name: Monitor refresh progress
        run: |
          for i in $(seq 1 30); do
            STATUS=$(aws autoscaling describe-instance-refreshes \
              --auto-scaling-group-name "${{ env.EDGE_ASG }}" \
              --instance-refresh-ids "$REFRESH_ID" \
              --region "${{ env.AWS_REGION }}" \
              --query 'InstanceRefreshes[0].Status' \
              --output text)
            PCT=$(aws autoscaling describe-instance-refreshes \
              --auto-scaling-group-name "${{ env.EDGE_ASG }}" \
              --instance-refresh-ids "$REFRESH_ID" \
              --region "${{ env.AWS_REGION }}" \
              --query 'InstanceRefreshes[0].PercentageComplete' \
              --output text)
            echo "[$i/30] Status=$STATUS  Complete=${PCT}%"
            case "$STATUS" in
              Successful) echo "Edge refresh complete."; exit 0 ;;
              Cancelled|Failed) echo "ERROR: Edge refresh $STATUS"; exit 1 ;;
            esac
            sleep 30
          done
          echo "Refresh still in progress after 15 minutes — check AWS Console."
          # Not failing — partial refresh is acceptable; remainder completes async.
          exit 0

  # ─── 5. Smoke test ────────────────────────────────────────────────────────
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: [deploy-origin, deploy-edge]
    steps:
      - name: Health check Origin via HTTPS
        run: |
          ORIGIN_URL="https://api.broadclass.xyz"
          echo "Testing $ORIGIN_URL/health ..."
          for i in $(seq 1 5); do
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" "$ORIGIN_URL/health")
            if [ "$HTTP" = "200" ]; then
              echo "Health check passed (HTTP $HTTP)"
              exit 0
            fi
            echo "Attempt $i: HTTP $HTTP — retrying in 10s"
            sleep 10
          done
          echo "ERROR: Health check failed after 5 attempts"
          exit 1
