  # Origin Server
  origin-server:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: origin
    container_name: broadclass-origin
    ports:
      - "3001:3001"
      - "40000-40399:40000-40399/udp"
      - "45000-45999:45000-45999/udp"  # Recording RTP ports
    environment:
      - PORT=3001
      - NODE_ENV=${NODE_ENV:-production}
      - ROLE=ORIGIN
      - ANNOUNCED_IP=${ANNOUNCED_IP:-127.0.0.1}
      - REDIS_URL=${REDIS_URL}
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET:-dev-broadcast-jwt-secret-change-in-production}
      - JWT_EXPIRES_IN=7d
      - FRONTEND_ORIGIN=${FRONTEND_ORIGIN:-http://localhost:5173}
      - ENABLE_SIMULCAST=true
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-broadclass-internal-key-change-in-production}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - NUM_WORKERS=2
      - RTC_MIN_PORT=40000
      - RTC_MAX_PORT=40399
      # S3 Recording Configuration
      - S3_BUCKET=${S3_BUCKET:-broadclass}
      - S3_REGION=${S3_REGION:-ap-south-1}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_PREFIX=${S3_PREFIX:-recordings}
      # Smart Chat (Phase 1+): where Origin pipes transcription audio.
      - AI_SERVICE_INTERNAL_URL=${AI_SERVICE_INTERNAL_URL:-http://ai-service:8080}
    # Uncomment if using local Redis:
    # depends_on:
    #   redis:
    #     condition: service_healthy
    restart: unless-stopped
    stop_grace_period: 40s
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

    networks:
      - broadclass-network

  # System Manager
  system-manager:
    build:
      context: ./backend
      dockerfile: Dockerfile.manager
    container_name: broadclass-system-manager
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=${NODE_ENV:-production}
      - ROLE=SYSTEM_MANAGER
      - REDIS_URL=${REDIS_URL}
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET:-dev-broadcast-jwt-secret-change-in-production}
      - JWT_EXPIRES_IN=7d
      - FRONTEND_ORIGIN=${FRONTEND_ORIGIN:-http://localhost:5173}
      # Shared internal-only key — system-manager uses it to call ai-service
      # /moderate and /answer. Must match the value passed to ai-service and
      # origin (both also pick this up).
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-broadclass-internal-key-change-in-production}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      # S3 Recording Configuration
      - S3_BUCKET=${S3_BUCKET:-broadclass}
      - S3_REGION=${S3_REGION:-ap-south-1}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_PREFIX=${S3_PREFIX:-recordings}
      # Smart Chat (Phase 3+): where System-Manager calls /answer & /moderate.
      - AI_SERVICE_INTERNAL_URL=${AI_SERVICE_INTERNAL_URL:-http://ai-service:8080}
    # Uncomment if using local Redis:
    # depends_on:
    #   redis:
    #     condition: service_healthy
    restart: unless-stopped
    stop_grace_period: 10s
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - broadclass-network

  # AI Service (Smart Chat: live transcription + RAG)
  # Phase 0: scaffold only — exposes /health and subscribes to transcription:control.
  # Phase 1+ adds Deepgram streaming STT, embeddings, and the /answer endpoint.
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: broadclass-ai-service
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - NODE_ENV=${NODE_ENV:-production}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      # Shared with origin / system-manager for internal-only calls.
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-broadclass-internal-key-change-in-production}
      # Provider keys. Only the ones for the providers you've selected
      # below need to be populated; others can be left empty.
      - DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # Provider selection — set in .env to switch vendors without rebuilding.
      #   STT_PROVIDER:        deepgram
      #   EMBEDDING_PROVIDER:  sentence_transformers | openai
      #   ANSWER_PROVIDER:     groq | openai | anthropic
      #   MODERATION_PROVIDER: groq | openai
      - STT_PROVIDER=${STT_PROVIDER:-deepgram}
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-sentence_transformers}
      - ANSWER_PROVIDER=${ANSWER_PROVIDER:-groq}
      - MODERATION_PROVIDER=${MODERATION_PROVIDER:-groq}
      # Model selection per provider (override-able via env).
      - ANSWER_MODEL_PRIMARY=${ANSWER_MODEL_PRIMARY:-llama-3.3-70b-versatile}
      - ANSWER_MODEL_FALLBACK=${ANSWER_MODEL_FALLBACK:-llama-3.1-8b-instant}
      - MODERATION_MODEL=${MODERATION_MODEL:-llama-3.1-8b-instant}
      - EMBEDDING_MODEL_NAME=${EMBEDDING_MODEL_NAME:-sentence-transformers/all-MiniLM-L6-v2}
      - OPENAI_ANSWER_MODEL=${OPENAI_ANSWER_MODEL:-gpt-4o-mini}
      - OPENAI_MODERATION_MODEL=${OPENAI_MODERATION_MODEL:-omni-moderation-latest}
      - OPENAI_EMBEDDING_MODEL=${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      - ANTHROPIC_ANSWER_MODEL=${ANTHROPIC_ANSWER_MODEL:-claude-haiku-4-5-20251001}
    restart: unless-stopped
    stop_grace_period: 15s
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; urllib.request.urlopen('http://localhost:8080/health/live', timeout=3); sys.exit(0)"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - broadclass-network

  # Edge Server 1
  edge-server-1:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: edge
    container_name: broadclass-edge-1
    ports:
      - "3002:3002"
      - "50000-50399:50000-50399/udp"
    environment:
      - PORT=3002
      - EXTERNAL_PORT=3002
      - INTERNAL_HOST=edge-server-1
      - NODE_ENV=${NODE_ENV:-production}
      - ROLE=EDGE
      - SERVER_ID=EDGE-01
      - ANNOUNCED_IP=${ANNOUNCED_IP:-127.0.0.1}
      - ORIGIN_IP=origin-server
      - ORIGIN_PORT=3001
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET=${JWT_SECRET:-dev-broadcast-jwt-secret-change-in-production}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-broadclass-internal-key-change-in-production}
      - MAX_CAPACITY=200
      - HEALTH_CHECK_INTERVAL=10000
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - FRONTEND_ORIGIN=${FRONTEND_ORIGIN:-https://broadclass.xyz}
      - NUM_WORKERS=2
      - RTC_MIN_PORT=50000
      - RTC_MAX_PORT=50399
    depends_on:
      origin-server:
        condition: service_healthy
    restart: unless-stopped
    stop_grace_period: 10s
    networks:
      - broadclass-network

