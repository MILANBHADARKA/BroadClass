# docker-compose.autoscale.yml
#
# Override file for auto-scaling mode.
# Removes static edge services — Origin dynamically creates edges via Docker API.
#
# Usage:
#   1. Build the shared edge image:
#      docker-compose -f docker-compose.yml -f docker-compose.autoscale.yml build
#
#   2. Start in auto-scale mode:
#      docker-compose -f docker-compose.yml -f docker-compose.autoscale.yml up -d redis origin-server
#
#   The origin will automatically create/remove edge containers based on load.
#

services:
  # Build a reusable edge image with a fixed name
  edge-image:
    build:
      context: ./backend
      dockerfile: Dockerfile.edge
    image: broadclass-edge
    profiles:
      - build-only           # never started — only built

  origin-server:
    environment:
      - AUTO_SCALE_ENABLED=true
      - AUTO_SCALE_MIN_EDGES=${AUTO_SCALE_MIN_EDGES:-2}
      - AUTO_SCALE_MAX_EDGES=${AUTO_SCALE_MAX_EDGES:-10}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock    # Docker-in-Docker control

  # Disable static edges (scale to 0)
  edge-server-1:
    deploy:
      replicas: 0

  edge-server-2:
    deploy:
      replicas: 0

  edge-server-3:
    deploy:
      replicas: 0
